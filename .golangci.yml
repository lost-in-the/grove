linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Go vet
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused code
    - gofmt         # Check formatting
    - goimports     # Check imports
    - misspell      # Check for misspelled words
    - revive        # Fast, configurable, extensible linter
    - gosec         # Security issues
    - typecheck     # Type checking

linters-settings:
  errcheck:
    check-blank: true
  revive:
    rules:
      - name: exported
        disabled: true  # Allow unexported returns from exported functions
  gosec:
    excludes:
      - G204  # Subprocess with variable - we use exec.Command properly

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # Exclude error wrapping check in test files
    - path: _test\.go
      text: "error returned from external package is unwrapped"
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - testdata
    - bin
    - dist
