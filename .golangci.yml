# golangci-lint configuration for Grove
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/lost-in-the/grove

linters:
  # Use default enabled linters (errcheck, govet, ineffassign, staticcheck, unused)
  # Plus additional linters:
  enable:
    - misspell      # Finds misspelled words

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Not critical for this project

    misspell:
      locale: US

    errcheck:
      # Ignore error checks for these functions (common patterns)
      exclude-functions:
        - (*bufio.Writer).Flush
        - (*bufio.Writer).WriteString
        - (*os.File).Close
        - io.Closer.Close

  exclusions:
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - errcheck

      # Exclude "shadow" check for err variable (common pattern)
      - linters:
          - govet
        text: "shadow: declaration of \"err\""

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
