# Grove hooks configuration
# Auto-generated for detected project type: go
#
# Edit: grove config --hooks -e
# Docs: https://github.com/lost-in-the/grove#hooks

[[hooks.post_create]]
type = "copy"
from = ".env"
to = ".env"
required = false

# Share Claude Code project config across worktrees
[[hooks.post_create]]
type = "symlink"
from = ".claude"
to = ".claude"

[[hooks.post_create]]
type        = "command"
command     = "mise trust"
working_dir = "new"
on_failure  = "warn"

