# Grove hooks configuration
# Auto-generated for detected project type: go
#
# Edit: grove config --hooks -e
# Docs: https://github.com/LeahArmstrong/grove-cli#hooks

[[hooks.post_create]]
type = "copy"
from = ".env"
to = ".env"
required = false

# Share Claude Code project config across worktrees
[[hooks.post_create]]
type = "symlink"
from = ".claude"
to = ".claude"

