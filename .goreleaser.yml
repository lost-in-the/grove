# GoReleaser configuration for Grove
# Documentation: https://goreleaser.com
version: 2

before:
  hooks:
    # Ensure go.mod is tidy
    - go mod tidy
    # Run tests before building
    - go test ./...

builds:
  - id: grove
    main: ./cmd/grove
    binary: grove
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Skip combinations that don't make sense
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/LeahArmstrong/grove-cli/internal/version.Version={{.Version}}
      - -X github.com/LeahArmstrong/grove-cli/internal/version.Commit={{.Commit}}
      - -X github.com/LeahArmstrong/grove-cli/internal/version.BuildDate={{.Date}}

archives:
  - id: grove
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - CONTRIBUTING.md
      - shell/**

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'
  groups:
    - title: 'Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Other Changes'
      order: 999

release:
  github:
    owner: LeahArmstrong
    name: grove-cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Grove {{ .Tag }} ({{ .Date }})

    Zero-friction worktree management for developers.

    ### Installation

    #### Homebrew (macOS/Linux)
    ```bash
    brew tap LeahArmstrong/tap
    brew install grove
    ```

    #### Direct Download
    Download the appropriate binary for your platform from the assets below.

    #### Go Install
    ```bash
    go install github.com/LeahArmstrong/grove-cli/cmd/grove@{{ .Tag }}
    ```

  footer: |
    **Full Changelog**: https://github.com/LeahArmstrong/grove-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Quick Start

    After installation, set up shell integration:

    ```bash
    grove setup
    ```

    Or manually:
    ```bash
    # For zsh (~/.zshrc)
    eval "$(grove install zsh)"

    # For bash (~/.bashrc)
    eval "$(grove install bash)"
    ```

    Then create your first worktree:
    ```bash
    grove new my-feature
    grove to my-feature
    ```

    See the [README](https://github.com/LeahArmstrong/grove-cli#readme) for full documentation.

# Announcement configuration
announce:
  skip: true
