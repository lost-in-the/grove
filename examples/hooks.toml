# =============================================================================
# Pre-Remove Hooks - Run before 'grove rm <name>'
# =============================================================================

# Stop Docker containers before removing worktree
[[hooks.pre_remove]]
type = "command"
command = "docker compose down --remove-orphans 2>/dev/null || true"
on_failure = "ignore"

# =============================================================================
# Post-Remove Hooks - Run after worktree is removed
# =============================================================================

# Clean up any leftover processes
[[hooks.post_remove]]
type = "command"
command = "pkill -f '{{.worktree}}' 2>/dev/null || true"
on_failure = "ignore"

# =============================================================================
# Template Variables
# =============================================================================
#
# Available in all string fields:
#
#   {{.worktree}}      - Short worktree name (e.g., "testing")
#   {{.worktree_full}} - Full directory name (e.g., "grove-testing")
#   {{.branch}}        - Git branch name (e.g., "feature/testing")
#   {{.project}}       - Project name (e.g., "grove")
#   {{.main_path}}     - Absolute path to main worktree
#   {{.new_path}}      - Absolute path to new worktree
#   {{.prev_path}}     - Absolute path to previous worktree (switch events)
#   {{.port}}          - Allocated port number (if using port allocation)
#   {{.user}}          - Current username
#   {{.timestamp}}     - Unix timestamp
#   {{.date}}          - ISO date (YYYY-MM-DD)
#
# =============================================================================
# Per-Branch/Worktree Overrides
# =============================================================================
#
# Override hook behavior for specific branch/worktree patterns.
# First match wins. Patterns use filepath.Match glob syntax.

# Skip symlinks for hotfix branches (faster setup)
[[overrides]]
match = "hotfix/*"
skip = ["symlink"]
extra_copy = [".env.production"]

# Skip all hooks for CI branches
[[overrides]]
match = "ci-*"
skip_hooks = true

# Add production credentials for payment feature branches
[[overrides]]
match = "feature/payments-*"
extra_copy = ["config/credentials/production.yml.enc"]

# Run extra database setup for migration branches
[[overrides]]
match = "db-*"
extra_run = ["bin/rails db:migrate"]

# =============================================================================
# Override Flags
# =============================================================================
#
# By default, project hooks are appended to global hooks.
# Set these to true to completely replace global hooks for an event:
#
# [hooks]
# override_post_create = true    # Only use this file's post_create hooks
# override_pre_remove = true
# override_post_remove = true
