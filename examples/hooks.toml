# Grove Hooks Configuration
#
# This file configures hooks that run on worktree lifecycle events.
# Place this file at:
#   - ~/.config/grove/hooks.toml (global, applies to all projects)
#   - .grove/hooks.toml (project-specific, merged with global)
#
# Project hooks are appended to global hooks unless override_* flags are set.

# =============================================================================
# Post-Create Hooks - Run after 'grove new <name>'
# =============================================================================

# Copy .env file from main worktree
[[hooks.post_create]]
type = "copy"
from = ".env"                    # Relative to main worktree
to = ".env"                      # Relative to new worktree
required = false                 # Warn if missing, don't fail

# Copy Rails master key
[[hooks.post_create]]
type = "copy"
from = "config/master.key"
to = "config/master.key"

# Symlink node_modules to save disk space
[[hooks.post_create]]
type = "symlink"
from = "node_modules"
to = "node_modules"

# Symlink vendor/bundle for Ruby projects
[[hooks.post_create]]
type = "symlink"
from = "vendor/bundle"
to = "vendor/bundle"

# Run bundle install in new worktree
[[hooks.post_create]]
type = "command"
command = "bundle install --quiet"
working_dir = "new"              # "new" (default), "main", or absolute path
timeout = 300                    # 5 minutes
on_failure = "warn"              # "warn" (default), "fail", "ignore"

# Run npm install
[[hooks.post_create]]
type = "command"
command = "npm install --silent"
timeout = 180

# Generate .env from template with variable substitution
[[hooks.post_create]]
type = "template"
from = ".env.template"
to = ".env"
vars = { PORT = "{{.port}}", DB_NAME = "{{.worktree}}_development" }

# =============================================================================
# AI Coding Tools - Share project config across worktrees
# =============================================================================

# Claude Code project settings (settings.local.json, context/, etc.)
[[hooks.post_create]]
type = "symlink"
from = ".claude"
to = ".claude"

# Cursor project settings
[[hooks.post_create]]
type = "symlink"
from = ".cursor"
to = ".cursor"

# Windsurf project settings
[[hooks.post_create]]
type = "symlink"
from = ".windsurf"
to = ".windsurf"

# Aider project settings
[[hooks.post_create]]
type = "copy"
from = ".aider.conf.yml"
to = ".aider.conf.yml"
required = false

